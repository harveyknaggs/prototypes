  <script type="text/babel" data-type="module" data-presets="react">
// Shared primitives: Card wrapper with springy entrance + hover tilt
const { useEffect, useRef, useState, useMemo, useLayoutEffect } = React;

function useSpringyTilt(enabled = true) {
  const ref = useRef(null);
  useEffect(() => {
    if (!enabled) return;
    const el = ref.current;
    if (!el) return;
    let raf = 0;
    const onMove = (e) => {
      const r = el.getBoundingClientRect();
      const x = (e.clientX - r.left) / r.width - 0.5;
      const y = (e.clientY - r.top) / r.height - 0.5;
      cancelAnimationFrame(raf);
      raf = requestAnimationFrame(() => {
        el.style.transform = `perspective(900px) rotateX(${-y * 2.2}deg) rotateY(${x * 2.2}deg) translateY(-2px)`;
      });
    };
    const onLeave = () => {
      cancelAnimationFrame(raf);
      el.style.transform = '';
    };
    el.addEventListener('mousemove', onMove);
    el.addEventListener('mouseleave', onLeave);
    return () => {
      el.removeEventListener('mousemove', onMove);
      el.removeEventListener('mouseleave', onLeave);
      cancelAnimationFrame(raf);
    };
  }, [enabled]);
  return ref;
}

function Card({ children, delay = 0, className = '', style = {}, tilt = false, onClick, ...rest }) {
  const tiltRef = useSpringyTilt(tilt);
  return (
    <div
      ref={tiltRef}
      onClick={onClick}
      className={`card ${className}`}
      style={{
        background: 'var(--surface)',
        borderRadius: 'var(--radius-lg)',
        boxShadow: 'var(--shadow-md)',
        border: '1px solid var(--line)',
        animation: `floatIn 0.8s ${delay}s cubic-bezier(0.34, 1.56, 0.64, 1) both`,
        willChange: 'transform',
        transition: 'transform 300ms cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 260ms ease',
        ...style,
      }}
      {...rest}
    >
      {children}
    </div>
  );
}

function Chip({ children, tone = 'default', size = 'sm', style = {}, ...rest }) {
  const tones = {
    default: { bg: '#f0ece2', fg: '#3a3832', border: '#e4ddd0' },
    good: { bg: 'var(--good-soft)', fg: 'var(--good)', border: '#b9e2c9' },
    accent: { bg: 'var(--accent-soft)', fg: 'var(--accent-ink)', border: '#d4d2ff' },
    warn: { bg: 'var(--warn-soft)', fg: 'var(--warn)', border: '#f1d1a8' },
    ink: { bg: 'var(--ink)', fg: '#fff', border: 'var(--ink)' },
    muted: { bg: 'transparent', fg: 'var(--ink-3)', border: 'var(--line-2)' },
    hot: { bg: '#ffe9e4', fg: '#c6361d', border: '#f5c8bd' },
  };
  const t = tones[tone] || tones.default;
  const pad = size === 'lg' ? '6px 12px' : '3px 9px';
  const fs = size === 'lg' ? 13 : 11;
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 5,
      padding: pad, borderRadius: 999,
      background: t.bg, color: t.fg, border: `1px solid ${t.border}`,
      fontSize: fs, fontWeight: 600, letterSpacing: '-0.005em',
      ...style,
    }} {...rest}>{children}</span>
  );
}

function Btn({ children, variant = 'default', size = 'md', icon, iconRight, style = {}, ...rest }) {
  const pads = { sm: '6px 10px', md: '9px 14px', lg: '12px 18px' };
  const fs = { sm: 12.5, md: 13.5, lg: 14 };
  const variants = {
    default: { bg: '#fff', fg: 'var(--ink)', border: 'var(--line-2)', hoverBg: '#faf7f1' },
    accent: { bg: 'var(--accent)', fg: '#fff', border: 'var(--accent)', hoverBg: 'var(--accent-ink)' },
    ghost: { bg: 'transparent', fg: 'var(--ink-2)', border: 'transparent', hoverBg: 'var(--bg-deep)' },
    danger: { bg: '#fff', fg: 'var(--danger)', border: '#f1c5c9', hoverBg: '#fdf2f3' },
    dark: { bg: 'var(--ink)', fg: '#fff', border: 'var(--ink)', hoverBg: '#000' },
  };
  const v = variants[variant] || variants.default;
  const [hov, setHov] = useState(false);
  return (
    <button
      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => setHov(false)}
      style={{
        display: 'inline-flex', alignItems: 'center', gap: 7,
        padding: pads[size], fontSize: fs[size], fontWeight: 600,
        borderRadius: 10, border: `1px solid ${v.border}`,
        background: hov ? v.hoverBg : v.bg, color: v.fg,
        boxShadow: variant === 'accent' || variant === 'dark' ? '0 1px 0 rgba(0,0,0,0.15), 0 4px 12px -4px rgba(45,43,255,0.3)' : '0 1px 0 rgba(27,26,23,0.04)',
        transition: 'all 200ms cubic-bezier(0.34, 1.56, 0.64, 1)',
        transform: hov ? 'translateY(-1px) scale(1.02)' : 'translateY(0)',
        letterSpacing: '-0.005em',
        ...style,
      }}
      {...rest}
    >
      {icon && <Icon name={icon} size={fs[size]} />}
      {children}
      {iconRight && <Icon name={iconRight} size={fs[size]} />}
    </button>
  );
}

function AnimatedNumber({ value, duration = 900, format = (v) => v, suffix = '' }) {
  const [display, setDisplay] = useState(0);
  useEffect(() => {
    let raf; const start = performance.now(); const from = 0; const to = value;
    const tick = (now) => {
      const t = Math.min(1, (now - start) / duration);
      // ease out back-ish
      const e = 1 - Math.pow(1 - t, 3);
      setDisplay(from + (to - from) * e);
      if (t < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [value, duration]);
  return <span>{format(display)}{suffix}</span>;
}

// Decorative "photo" rendered from gradients + shapes based on hue
function PhotoScene({ hue, compact = false }) {
  return (
    <svg width="100%" height="100%" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice" style={{ position: 'absolute', inset: 0, display: 'block' }}>
      <defs>
        <linearGradient id={`sky-${hue}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stopColor={`hsl(${hue}, 30%, 75%)`} />
          <stop offset="1" stopColor={`hsl(${hue}, 25%, 60%)`} />
        </linearGradient>
        <linearGradient id={`grd-${hue}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stopColor={`hsl(${hue}, 20%, 55%)`} />
          <stop offset="1" stopColor={`hsl(${hue}, 25%, 35%)`} />
        </linearGradient>
      </defs>
      <rect width="400" height="300" fill={`url(#sky-${hue})`} />
      {/* subtle hills */}
      <path d={`M0 ${200 + (hue%40)} Q 100 ${180 + (hue%30)} 200 ${210 + (hue%20)} T 400 ${200 + (hue%25)} L 400 300 L 0 300 Z`}
        fill={`url(#grd-${hue})`} opacity="0.9" />
      {/* sun/moon */}
      <circle cx={70 + (hue%120)} cy={60 + (hue%40)} r={compact ? 14 : 24} fill="#fff" opacity="0.6"/>
      {/* rectangle "building" */}
      <rect x={130 + (hue%80)} y={140 + (hue%40)} width={120} height={90}
        fill={`hsl(${hue}, 15%, 25%)`} opacity="0.45" rx="2"/>
      <rect x={140 + (hue%80)} y={160 + (hue%40)} width={20} height={28}
        fill={`hsl(${hue}, 60%, 85%)`} opacity="0.8"/>
      <rect x={180 + (hue%80)} y={160 + (hue%40)} width={20} height={28}
        fill={`hsl(${hue}, 60%, 85%)`} opacity="0.8"/>
    </svg>
  );
}

function IconPill({ children, onClick }) {
  const [hov, setHov] = useState(false);
  return (
    <button onClick={onClick} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{
        width: 32, height: 32, borderRadius: 999,
        background: hov ? '#fff' : 'rgba(255,255,255,0.92)',

        transform: hov ? 'scale(1.1)' : 'scale(1)',
        backdropFilter: 'blur(6px)',
      }}>{children}</button>
  );
}

function shift(hex, amt) {
  // approximate darken by mixing toward black
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  const f = (v) => Math.max(0, v - amt).toString(16).padStart(2, '0');
  return `#${f(r)}${f(g)}${f(b)}`;
}

// Overlapping avatar circles for the collapsed header
function LeadAvatarCluster({ open }) {
  const [hov, setHov] = useState(false);
  const active = open || hov;
  return (
    <div
      style={{ position: 'relative', width: 56, height: 56, flexShrink: 0 }}

        const angle = (fanAngles[i] * Math.PI) / 180;
        const fx = Math.sin(angle) * fanRadius;
        const fy = -Math.abs(Math.cos(angle)) * fanRadius * 0.4;

        // stacked positions (slight offset)
        const sx = (i - 2) * 3;
        const sy = 0;

        return (
          <div key={l.id} style={{
            position: 'absolute',
            left: '50%', top: '50%',
            width: 30, height: 30,
            borderRadius: '50%',
            background: `linear-gradient(135deg, ${l.accent} 0%, ${l.accent}cc 100%)`,

            transform: active
              ? `translate(calc(-50% + ${fx}px), calc(-50% + ${fy}px))`

function stageTone(s) {
  if (s === 'New') return 'accent';
  if (s === 'Qualified') return 'good';
  if (s === 'Following up') return 'warn';
  if (s === 'Closed') return 'muted';
  return 'default';
}

function Sparkline() {
  const data = [2, 1, 3, 2, 4, 3, 5];
  const max = Math.max(...data);
  return (
    <svg width="78" height="34" viewBox="0 0 78 34">
      <defs>
        <linearGradient id="sp" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stopColor="var(--accent)" stopOpacity="0.25"/>
          <stop offset="1" stopColor="var(--accent)" stopOpacity="0"/>
        </linearGradient>
      </defs>
      {(() => {
        const pts = data.map((v, i) => [i * (78 / (data.length - 1)), 30 - (v / max) * 24]);
        const path = pts.map(([x, y], i) => `${i === 0 ? 'M' : 'L'}${x},${y}`).join(' ');
        const area = path + ` L78,34 L0,34 Z`;
        return (
          <>
            <path d={area} fill="url(#sp)"/>
            <path d={path} fill="none" stroke="var(--accent)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
            {pts.map(([x, y], i) => (
              <circle key={i} cx={x} cy={y} r={i === pts.length - 1 ? 3 : 1.8} fill="var(--accent)"/>
            ))}
          </>
        );
      })()}
    </svg>
  );
}

  const accents = {
    indigo: '#2d2bff',
    forest: '#0f7a4d',
    amber:  '#b4530a',
    slate:  '#1b1a17',
    rose:   '#c6361d',
  };
  return (
    <div style={{
      position: 'fixed', right: 20, bottom: 20,
      width: 280, zIndex: 50,
      background: '#fff', borderRadius: 18,
      border: '1px solid var(--line)',
      boxShadow: '0 24px 48px -16px rgba(27,26,23,0.25)',
      padding: 16,
      animation: 'floatIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both',
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12 }}>
        <Icon name="sparkles" size={15} style={{ color: 'var(--accent)' }}/>
        <div style={{ fontSize: 14, fontWeight: 700 }}>Tweaks</div>
      </div>

      <Row label="Motion">
        <Pills opts={['subtle', 'lively', 'off']} value={state.motion}
          onChange={(v) => setState({ ...state, motion: v })}/>
      </Row>

      <Row label="Accent">
        <div style={{ display: 'flex', gap: 6 }}>
          {Object.entries(accents).map(([k, c]) => (
            <button key={k} onClick={() => setState({ ...state, accent: k })} title={k} style={{
              width: 24, height: 24, borderRadius: 7,
              background: c,
              border: state.accent === k ? '2px solid var(--ink)' : '2px solid transparent',
              outline: state.accent === k ? '2px solid var(--bg-deep)' : 'none',
              transition: 'transform 200ms cubic-bezier(0.34, 1.56, 0.64, 1)',
              transform: state.accent === k ? 'scale(1.1)' : 'scale(1)',
            }}/>
          ))}
        </div>
      </Row>

      <Row label="Density">
        <Pills opts={['comfortable', 'compact']} value={state.density}
          onChange={(v) => setState({ ...state, density: v })}/>
      </Row>

      <Row label="Hover tilt" last>
        <button onClick={() => setState({ ...state, hoverTilt: !state.hoverTilt })} style={{
          width: 34, height: 20, borderRadius: 12,
          background: state.hoverTilt ? 'var(--accent)' : 'var(--bg-deep)',
          position: 'relative', transition: 'background 200ms',
        }}>
          <span style={{
            position: 'absolute', top: 2, left: state.hoverTilt ? 16 : 2,
            width: 16, height: 16, borderRadius: '50%', background: '#fff',
            boxShadow: '0 1px 2px rgba(0,0,0,0.2)',
            transition: 'left 220ms cubic-bezier(0.34, 1.56, 0.64, 1)',
          }}/>
        </button>
      </Row>
    </div>
  );
}

function Row({ label, last, children }) {
  return (
    <div style={{
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      padding: '10px 0',
      borderBottom: last ? 'none' : '1px solid var(--line)',
    }}>
      <div style={{ fontSize: 12, color: 'var(--ink-3)', fontWeight: 500 }}>{label}</div>
      {children}
    </div>
  );
}

function Pills({ opts, value, onChange }) {
  return (
    <div style={{ display: 'flex', padding: 3, background: 'var(--bg)', borderRadius: 9, border: '1px solid var(--line)' }}>
      {opts.map((o) => (
        <button key={o} onClick={() => onChange(o)} style={{
          padding: '3px 10px', fontSize: 11, fontWeight: 600,
          borderRadius: 7,
          background: value === o ? '#fff' : 'transparent',
          color: value === o ? 'var(--ink)' : 'var(--ink-3)',
          boxShadow: value === o ? '0 1px 2px rgba(27,26,23,0.08)' : 'none',
          textTransform: 'capitalize',
        }}>{o}</button>
      ))}
    </div>
  );
}

window.TweaksPanel = TweaksPanel;

  </script>
  <script type="text/babel" data-type="module" data-presets="react">
const { useState, useEffect, useMemo } = React;

function App() {
  const initialTweaks = JSON.parse(
    document.getElementById('tweak-defaults').textContent
      .replace(/\/\*EDITMODE-BEGIN\*\//, '')
      .replace(/\/\*EDITMODE-END\*\//, '')
      .trim()
  );
  const [tweaks, setTweaks] = useState(initialTweaks);
  const [tweaksVisible, setTweaksVisible] = useState(false);

  // Apply accent CSS variable
  useEffect(() => {
    const accents = {
      indigo: { accent: '#2d2bff', soft: '#eeedff', ink: '#1a18cc' },
      forest: { accent: '#0f7a4d', soft: '#dff3e7', ink: '#0a5836' },
      amber:  { accent: '#b4530a', soft: '#fbe8d4', ink: '#8a3f06' },
      slate:  { accent: '#1b1a17', soft: '#ebe5d9', ink: '#000' },
      rose:   { accent: '#c6361d', soft: '#ffe9e4', ink: '#8a230f' },
    };
    const a = accents[tweaks.accent] || accents.indigo;
    document.documentElement.style.setProperty('--accent', a.accent);
    document.documentElement.style.setProperty('--accent-soft', a.soft);
    document.documentElement.style.setProperty('--accent-ink', a.ink);
  }, [tweaks.accent]);

  // Tweaks protocol
  useEffect(() => {
    const handler = (ev) => {
      const d = ev.data;
      if (!d || typeof d !== 'object') return;
      if (d.type === '__activate_edit_mode') setTweaksVisible(true);
      if (d.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const updateTweaks = (next) => {
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };

  const lively = tweaks.motion === 'lively';
  const off = tweaks.motion === 'off';
  const tilt = tweaks.hoverTilt && lively;
  const pad = tweaks.density === 'compact' ? 20 : 32;

  // motion "off" — remove animations
  useEffect(() => {
    const style = document.getElementById('motion-off-style') || document.createElement('style');
    style.id = 'motion-off-style';
    style.textContent = off ? `.card, .card * { animation: none !important; }` : '';
    if (!style.parentElement) document.head.appendChild(style);
  }, [off]);

  return (
    <div style={{
      display: 'flex',
      minHeight: '100vh',
      background: 'var(--bg)',
      color: 'var(--ink)',
    }}>
      <Sidebar/>
      <main style={{
        flex: 1, minWidth: 0,
        padding: `${pad}px ${pad + 8}px ${pad + 20}px`,
        maxWidth: 1280, margin: '0 auto', width: '100%',
      }}>
        {/* Breadcrumb */}
        <div style={{
          display: 'flex', alignItems: 'center', gap: 8,
          marginBottom: 22, fontSize: 12.5, color: 'var(--ink-3)',
          animation: 'floatIn 0.5s 0s cubic-bezier(0.34, 1.56, 0.64, 1) both',
        }}>
          <a style={{ color: 'var(--ink-3)', display: 'inline-flex', alignItems: 'center', gap: 5 }}>
            <Icon name="arrow-left" size={13}/> Back to listings
          </a>
          <span style={{ color: 'var(--ink-4)' }}>/</span>
          <span style={{ color: 'var(--ink-2)', fontWeight: 500 }}>{property.title}</span>
          <div style={{ flex: 1 }}/>
          <button style={{
            display: 'inline-flex', alignItems: 'center', gap: 6,
            padding: '4px 9px', borderRadius: 999,
            background: '#fff', border: '1px solid var(--line)',
            fontSize: 11.5, fontWeight: 500, color: 'var(--ink-3)',
          }}>
            <Icon name="bell" size={11}/> Notify me on new leads
          </button>
          <Btn size="sm" variant="ghost" icon="trash" style={{ color: 'var(--danger)' }}>Delete</Btn>
        </div>

        {/* Cards */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
          <Hero delay={0.05}/>
          <SpecsCard delay={0.15}/>
          <div style={{
            display: 'grid',
            gridTemplateColumns: 'minmax(0, 1.15fr) minmax(0, 1fr)',
            gap: 20,
          }}>
            <DocumentsCard delay={0.25}/>
            <LeadsCard delay={0.3}/>
          </div>

          {/* Footer */}
          <div style={{
            padding: '16px 4px',
            fontSize: 11.5, color: 'var(--ink-4)',
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            animation: 'floatIn 0.6s 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both',
          }}>
            <span>Listing ID · <span className="mono">#d8ksv-rangitoto</span></span>
            <span>Last edited yesterday · autosaved</span>
          </div>
        </div>
      </main>

      {/* Apply hover tilt override */}
      <HoverTiltContext.Provider value={tilt}>
        <span/>
      </HoverTiltContext.Provider>

      <TweaksPanel state={tweaks} setState={updateTweaks} visible={tweaksVisible}/>
    </div>
  );
}

// small no-op context to keep tree happy (tilt wiring is per-card via data)
const HoverTiltContext = React.createContext(false);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

  </script>
</body>
</html>
