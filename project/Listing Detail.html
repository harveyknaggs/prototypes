<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Listing · 14 Rangitoto Terrace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f1ea;
    --bg-deep: #ebe5d9;
    --surface: #ffffff;
    --ink: #1b1a17;
    --ink-2: #3a3832;
    --ink-3: #6b6860;
    --ink-4: #a29e94;
    --line: #e4ddd0;
    --line-2: #d9d1c2;
    --accent: #2d2bff;
    --accent-soft: #eeedff;
    --accent-ink: #1a18cc;
    --good: #0f7a4d;
    --good-soft: #dff3e7;
    --warn: #b4530a;
    --warn-soft: #fbe8d4;
    --danger: #b21f2d;
    --radius: 18px;
    --radius-lg: 24px;
    --shadow-sm: 0 1px 0 rgba(27,26,23,0.04), 0 1px 2px rgba(27,26,23,0.04);
    --shadow-md: 0 1px 0 rgba(27,26,23,0.04), 0 8px 24px -12px rgba(27,26,23,0.14);
    --shadow-lg: 0 1px 0 rgba(27,26,23,0.04), 0 24px 60px -24px rgba(27,26,23,0.22);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    font-feature-settings: 'ss01', 'cv11';
  }
  .serif { font-family: 'Instrument Serif', Georgia, serif; font-weight: 400; letter-spacing: -0.01em; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  a { color: inherit; text-decoration: none; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #d4cdbd; border-radius: 10px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-track { background: transparent; }

  /* shared motion */
  @keyframes floatIn {
    0% { opacity: 0; transform: translateY(16px) scale(0.985); }
    60% { opacity: 1; transform: translateY(-3px) scale(1.005); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes popIn {
    0% { opacity: 0; transform: scale(0.6) rotate(-6deg); }
    60% { opacity: 1; transform: scale(1.1) rotate(2deg); }
    100% { opacity: 1; transform: scale(1) rotate(0); }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes pulseDot {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.4); opacity: 0.7; }
  }

  .enter { animation: floatIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
</style>
</head>
<body>
  <div id="root"></div>

  <script type="application/json" id="tweak-defaults">
  /*EDITMODE-BEGIN*/{
    "motion": "lively",
    "accent": "indigo",
    "density": "comfortable",
    "hoverTilt": true
  }/*EDITMODE-END*/
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="src/data.jsx"></script>
  <script type="text/babel" src="src/icons.jsx"></script>
  <script type="text/babel" src="src/primitives.jsx"></script>
  <script type="text/babel" src="src/sidebar.jsx"></script>

  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
